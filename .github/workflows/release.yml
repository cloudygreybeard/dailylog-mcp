name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: release
    uses: cloudygreybeard/homebrew-tap/.github/workflows/release-homebrew-formula.yml@main
    with:
      package-name: dailylog
      binary-name: dailylog
      formula-class: Dailylog
      formula-desc: "Daily activity logging with GitHub storage and MCP integration"
      artifact-style: goreleaser
      private: false
      install-extra: 'bin.install "dailyctl"'
      custom-test: |-
        system "#{bin}/dailylog", "--version"
              system "#{bin}/dailyctl", "version"
    secrets:
      deploy-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
